name: Build, Test and Publish
on: [push, pull_request, workflow_dispatch]

permissions: {}

jobs:
  test:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      PLAYWRIGHT_BROWSERS_PATH: /tmp/_playwright_cache

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          check-latest: true
          cache: "npm"

      - name: Restore playwright cache
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: |
            ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: playwright-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            playwright-

      - name: Install dependencies
        run: npm ci

      - name: Run build
        run: APP_ENV=development npm run build

      - name: Install test dependencies
        run: ./node_modules/.bin/playwright install-deps chromium firefox

      - name: Run tests
        run: npm run test

      - name: Run formatter/linter/i18next checks
        run: npm run check

      - name: Run separate package builds
        run: |
          ./.ci/test-build-separate.sh

  deploy:
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/demo' || github.ref == 'refs/heads/production'
    environment: ${{ github.ref_name }}

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Publish to NPM
        if: github.ref == 'refs/heads/main'
        run: |
          npm install -g npm@latest
          npm ci
          npm run build
          npm run publish

      - name: Deploy and wait for completion
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/demo'
        uses: digital-blueprint/gitlab-pipeline-trigger-action@c59b56e9d2688ab42c1304322ac8831a4ef6f7d2 # v1.4.0
        with:
          host: "gitlab.tugraz.at"
          trigger_token: ${{ secrets.DEPLOY_TRIGGER_TOKEN }}
          access_token: ${{ secrets.DEPLOY_ACCESS_TOKEN }}
          id: "21238"
          ref: "main"
          variables: '{"UPSTREAM_PROJECT_PATH":"dbp/web-components/toolkit","UPSTREAM_COMMIT_BRANCH":"${{ github.ref_name }}","UPSTREAM_COMMIT_SHA":"${{ github.ref_name }}"}'
          verbose: true
